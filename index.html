<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0d12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Aurora Player</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="screen-player" class="screen active">
  <header class="top-bar">
    <span class="app-name">AURORA</span>
    <button id="btn-open-admin" class="icon-btn" aria-label="Manage library">
      <i class="ti ti-settings"></i>
    </button>
  </header>

  <div class="track-info">
    <div id="track-title" class="track-title">No track loaded</div>
    <div id="track-artist" class="track-artist">Add songs to get started</div>
  </div>

  <div class="artwork-wrap">
    <div id="artwork-ring-outer" class="artwork-ring outer"></div>
    <div id="artwork-ring-inner" class="artwork-ring inner"></div>
    <div id="artwork-circle" class="artwork-circle">
      <i class="ti ti-music" id="artwork-icon"></i>
    </div>
  </div>

  <div class="progress-section">
    <div class="progress-bar-wrap" id="progress-wrap" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
        <div id="progress-thumb" class="progress-thumb"></div>
      </div>
    </div>
    <div class="progress-times">
      <span id="time-current">0:00</span>
      <span id="time-total">0:00</span>
    </div>
  </div>

  <div class="controls-row">
    <button id="btn-shuffle" class="ctrl-btn" aria-label="Shuffle">
      <i class="ti ti-arrows-shuffle"></i>
    </button>
    <button id="btn-prev" class="ctrl-btn" aria-label="Previous">
      <i class="ti ti-player-skip-back"></i>
    </button>
    <button id="btn-play" class="play-btn" aria-label="Play / Pause">
      <i class="ti ti-player-play" id="play-icon"></i>
    </button>
    <button id="btn-next" class="ctrl-btn" aria-label="Next">
      <i class="ti ti-player-skip-forward"></i>
    </button>
    <button id="btn-repeat" class="ctrl-btn" aria-label="Repeat">
      <i class="ti ti-repeat"></i>
    </button>
  </div>

  <div class="playlist-section">
    <div class="playlist-header">
      <span class="playlist-label">UP NEXT</span>
      <span id="playlist-count" class="playlist-count">0 songs</span>
    </div>
    <div id="playlist" class="playlist"></div>
  </div>
</div>


<div id="screen-admin" class="screen">
  <header class="top-bar">
    <button id="btn-back" class="icon-btn" aria-label="Back to player">
      <i class="ti ti-arrow-left"></i>
    </button>
    <span class="app-name">LIBRARY</span>
    <button id="btn-add-song" class="icon-btn add-btn" aria-label="Add songs">
      <i class="ti ti-plus"></i>
    </button>
  </header>

  <input type="file" id="file-input" accept="audio/*,.mp3,.mp4,.m4a,.ogg,.opus,.wav,.flac,.aac" multiple hidden />

  <div class="admin-info">
    <span id="admin-count">0 songs</span>
    <span id="admin-size">0 MB used</span>
  </div>

  <div id="admin-list" class="admin-list"></div>

  <div id="empty-state" class="empty-state">
    <i class="ti ti-music-off"></i>
    <p>No songs yet</p>
    <p class="empty-sub">Tap <strong>+</strong> to add your first MP3</p>
  </div>
</div>


<div id="modal-rename" class="modal-overlay" hidden>
  <div class="modal-box">
    <div class="modal-title">Edit Track Info</div>
    <label class="modal-label">Title</label>
    <input type="text" id="rename-title" class="modal-input" placeholder="Track title" />
    <label class="modal-label">Artist</label>
    <input type="text" id="rename-artist" class="modal-input" placeholder="Artist name" />
    <div class="modal-actions">
      <button id="modal-cancel" class="modal-btn secondary">Cancel</button>
      <button id="modal-save" class="modal-btn primary">Save</button>
    </div>
  </div>
</div>

<div id="toast" class="toast" aria-live="polite"></div>
<audio id="audio" preload="auto"></audio>

<script src="db.js"></script>
<script src="player.js"></script>
<script src="app.js"></script>
</body>
</html>
